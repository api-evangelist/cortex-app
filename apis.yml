aid: cortex-app
url: https://raw.githubusercontent.com/api-evangelist/cortex-app/refs/heads/main/apis.yml
name: Cortex
kind: company
description: >-
  Cortex is an Internal Developer Portal and service catalog used by platform
  and engineering teams to inventory services, libraries, domains, teams,
  on-call rotations, and resources; measure them against Scorecards (production
  readiness, security, SLO compliance, cost, AI usage); and drive
  developer-facing experiences through Initiatives, Workflows, and Scaffolder
  templates. Cortex pulls signals from GitHub, GitLab, AWS, Azure, GCP, Datadog,
  PagerDuty, Slack, Jira, Snyk, SonarQube, and many other integrations, and
  exposes a REST API and an MCP server so that humans and AI agents can query
  the catalog, scorecards, dependencies, and entity descriptors.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - Internal Developer Portal
  - Service Catalog
  - Scorecards
  - Platform Engineering
  - Developer Experience
  - SRE
created: '2026-05-23'
modified: '2026-05-23'
specificationVersion: '0.19'
apis:
  - aid: cortex-app:catalog-api
    name: Cortex Catalog API
    description: >-
      REST endpoints to list and retrieve catalog entities (services,
      libraries, domains, resources, teams) and their descriptors. Supports
      filtering by tag, type, group, and ownership; returns the canonical
      entity descriptor and its OpenAPI definition where available.
    humanURL: https://docs.cortex.io/
    baseURL: https://api.getcortexapp.com
    tags:
      - REST API
      - Catalog
      - Entities
    properties:
      - type: Documentation
        url: https://docs.cortex.io/
  - aid: cortex-app:scorecards-api
    name: Cortex Scorecards API
    description: >-
      REST endpoints to list Scorecards, fetch scores for a Scorecard across
      entities, and surface recommended next steps for improving an entity's
      score. Underpins production-readiness, security, and cost programs.
    humanURL: https://docs.cortex.io/
    baseURL: https://api.getcortexapp.com
    tags:
      - REST API
      - Scorecards
      - Quality
    properties:
      - type: Documentation
        url: https://docs.cortex.io/
  - aid: cortex-app:dependencies-api
    name: Cortex Dependencies API
    description: >-
      REST endpoints to list and inspect entity-to-entity dependencies (caller
      and callee) and the relationships used to build the service graph.
    humanURL: https://docs.cortex.io/
    baseURL: https://api.getcortexapp.com
    tags:
      - REST API
      - Dependencies
      - Graph
    properties:
      - type: Documentation
        url: https://docs.cortex.io/
  - aid: cortex-app:initiatives-api
    name: Cortex Initiatives API
    description: >-
      REST endpoints to list and retrieve Initiatives - time-boxed cross-team
      programs that track Scorecard progress, owners, and deadlines.
    humanURL: https://docs.cortex.io/
    baseURL: https://api.getcortexapp.com
    tags:
      - REST API
      - Initiatives
      - Programs
    properties:
      - type: Documentation
        url: https://docs.cortex.io/
  - aid: cortex-app:workflows-api
    name: Cortex Workflow Runs API
    description: >-
      REST endpoints for managing and querying Workflow runs, used to drive
      developer self-service actions and scaffolding from the Cortex IDP.
    humanURL: https://docs.cortex.io/
    baseURL: https://api.getcortexapp.com
    tags:
      - REST API
      - Workflows
      - Self-Service
    properties:
      - type: Documentation
        url: https://docs.cortex.io/
  - aid: cortex-app:mcp
    name: Cortex MCP Server
    description: >-
      Model Context Protocol server exposing Cortex catalog, scorecards,
      dependencies, and on-call data to AI agents and copilots through MCP
      tools and resources.
    humanURL: https://docs.cortex.io/
    baseURL: https://docs.cortex.io/
    tags:
      - MCP
      - AI
      - Agents
    properties:
      - type: Documentation
        url: https://docs.cortex.io/
